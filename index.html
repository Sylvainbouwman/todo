<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ToDo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="sticky-top">
            <header>
                <div class="header-left">
                    <h1>ToDo</h1>
                    <span id="header-summary"></span>
                </div>
                <button id="btn-add" title="Nieuwe taak (N)">+</button>
            </header>
            <div id="search-bar">
                <div class="search-wrap">
                    <svg class="search-icon-svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="8.5" cy="8.5" r="5.5"/>
                        <line x1="13" y1="13" x2="17" y2="17"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Zoeken… (druk / om te starten)" autocomplete="off" spellcheck="false">
                    <button id="search-clear" class="hidden" title="Wissen (Esc)">&#x2715;</button>
                </div>
            </div>
        </div>

        <!-- Modal voor toevoegen / bewerken -->
        <div id="modal-overlay" class="hidden">
            <div id="modal">
                <h2 id="modal-title">Nieuwe taak</h2>
                <form id="task-form">
                    <input type="text" id="task-title" placeholder="Wat moet je doen?" required>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="task-date">Dag</label>
                            <input type="date" id="task-date">
                        </div>
                        <div class="form-group">
                            <label for="task-time">Tijdstip</label>
                            <input type="time" id="task-time">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="task-duration">Tijdsduur</label>
                        <select id="task-duration">
                            <option value="">Geen schatting</option>
                            <option value="15">15 min</option>
                            <option value="30">30 min</option>
                            <option value="45">45 min</option>
                            <option value="60">1 uur</option>
                            <option value="90">1,5 uur</option>
                            <option value="120">2 uur</option>
                            <option value="180">3 uur</option>
                            <option value="240">4 uur</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button type="button" id="btn-cancel">Annuleer</button>
                        <button type="submit">Opslaan</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Undo toast -->
        <div id="undo-toast" class="hidden">
            <span id="undo-label"></span>
            <button id="undo-btn">Ongedaan maken</button>
        </div>

        <!-- Taakoverzicht -->
        <main id="task-list">
            <div class="loading">Laden…</div>
        </main>
    </div>

    <!-- Bevestigingsdialog afvinken — buiten #app om stacking context te vermijden -->
    <div id="confirm-overlay" class="hidden">
        <div id="confirm-dialog">
            <div class="confirm-icon">✓</div>
            <h2>Echt klaar?</h2>
            <p id="confirm-task-name"></p>
            <div class="confirm-actions">
                <button id="confirm-no">Nog even niet</button>
                <button id="confirm-yes">Ja, weg ermee!</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
<div style="position:fixed;bottom:10px;right:14px;z-index:9990;font-size:10px;color:#94a3b8;font-family:system-ui,-apple-system,sans-serif;background:rgba(255,255,255,0.8);padding:2px 6px;border-radius:4px;"><!-- LAST_UPDATED -->Laatste update: 14 jul 2026, 12:12</div>
</body>
</html>
